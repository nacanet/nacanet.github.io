name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      # TODO: remove after PR is merged into main
      - copilot/create-minimalist-website
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Pushes the built dist/ files to the gh-pages branch.
      # Go to repo Settings → Pages → set source to "Deploy from a branch" → gh-pages → / (root)
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          # Keep a .nojekyll file so GitHub Pages serves assets with underscores correctly
          enable_jekyll: false
